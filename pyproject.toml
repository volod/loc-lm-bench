[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "llb"
version = "0.1.0"
description = "loc-lm-bench: local Ukrainian LLM model-selection benchmark"
requires-python = ">=3.11"
dependencies = [
  "typer>=0.12",
  "pydantic>=2.6",
  "python-dotenv>=1.0",
  "pyyaml>=6.0",
  "huggingface-hub>=0.24",
  "openai>=1.40",
]

[project.optional-dependencies]
# Installed on demand, e.g. `uv pip install -e ".[rag,track]"`. Kept out of the base
# install so `make venv` stays fast.
rag = [
  "faiss-cpu>=1.8",
  "sentence-transformers>=3.0",
  "langchain-text-splitters>=0.2",
  "deepeval>=4.0.6,<5",
]
eval = ["langgraph>=0.2"]
track = ["mlflow>=2.15", "duckdb>=1.0", "pyarrow>=16.0", "optuna>=3.6"]
board = ["streamlit>=1.36"]
prep = ["litellm>=1.40"]
telemetry = ["nvidia-ml-py>=12.0", "psutil>=5.9"]
goldset = ["datasets>=2.19"]  # only needed for `ingest_squad --hf-dataset`
# NOTE: vLLM / torch / flash-attn are hardware-matched (host CUDA/GPU) and installed via a
# separate build path per AGENTS.md, never as plain deps here.
dev = ["mypy>=1.10", "pytest>=8.0", "ruff>=0.6"]

[project.scripts]
llb = "llb.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
files = ["src/llb"]
check_untyped_defs = true
disallow_any_generics = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true
pretty = true
show_error_codes = true

[tool.pytest.ini_options]
testpaths = ["tests"]
# DeepEval ships optional pytest integration and rerun plugins as runtime dependencies. The
# benchmark invokes metrics explicitly, so disable those global plugins in this test suite.
addopts = "-q -p no:deepeval -p no:rerunfailures"
filterwarnings = [
  # Emitted at interpreter shutdown by SciPy's bundled SWIG extension on Python 3.11.
  "ignore:builtin type (SwigPyPacked|SwigPyObject|swigvarlink) has no __module__ attribute:DeprecationWarning",
]
