# Serving tier manifest -- source of truth for `llb gen-serving-config`.
# Tiers: 12 | 16 | 24 | 32 (GPU VRAM GiB). Primary target ids are model families;
# each model field picks the largest concrete variant that fits on that tier
# (see docs/inference/config-example.md for rationale).

supported_tiers: [12, 16, 24, 32]

eval_defaults:
  seed: 13
  max_tokens: 256
  temperature: 0.0
  n_shot: 0
  embedding_model: intfloat/multilingual-e5-base
  strategy: recursive
  chunk_size: 800
  chunk_overlap: 120
  top_k: 5
  retrieval_mode: flat
  measure_telemetry: true
  goldset_path: samples/goldsets/ua_squad_postedited_v1/goldset.jsonl

vllm_defaults:
  port: 8000
  kv_cache_dtype: fp8
  max_num_seqs: 1

tiers:
  12:
    mamaylm:
      backend: ollama
      model: hf.co/INSAIT-Institute/MamayLM-Gemma-3-27B-IT-v2.0-GGUF:Q4_K_M
      request_timeout_s: 300
    lapa:
      backend: ollama
      model: hf.co/lapa-llm/lapa-v0.1.2-instruct-GGUF:Q4_K_M
      request_timeout_s: 300
    gemma-4:
      backend: ollama
      model: gemma4:e4b
      request_timeout_s: 300
    qwen3.6:
      backend: ollama
      model: batiai/qwen3.6-35b:iq3
      request_timeout_s: 300
    qwen3-30b:
      backend: ollama
      model: qwen3:30b
      request_timeout_s: 300
    mistral:
      backend: ollama
      model: mistral-small3.1:24b
      request_timeout_s: 300
    gemma-4-12b-vllm:
      backend: vllm
      model: google/gemma-4-12B-it-qat-w4a16-ct
      gpu_memory_utilization: 0.90
      max_model_len: 16384
      cpu_offload_gb: 16
      kv_offloading_size_gb: 32
      limit_mm_per_prompt: '{"image": 0, "audio": 0}'

  16:
