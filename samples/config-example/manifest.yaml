# Serving tier manifest -- source of truth for `llb gen-serving-config`.
# Tiers: 12 | 16 | 24 | 32 (GPU VRAM GiB). Each target picks the largest model variant
# that fits on that tier (see docs/inference/config-example.md for rationale).

supported_tiers: [12, 16, 24, 32]

eval_defaults:
  seed: 13
  max_tokens: 256
  temperature: 0.0
  n_shot: 0
  embedding_model: intfloat/multilingual-e5-base
  strategy: recursive
  chunk_size: 800
  chunk_overlap: 120
  top_k: 5
  retrieval_mode: flat
  measure_telemetry: true
  goldset_path: .data/llb/goldset/sample_rag_items.jsonl

vllm_defaults:
  port: 8000
  kv_cache_dtype: fp8
  max_num_seqs: 1

tiers:
  12:
    mamaylm:
      backend: ollama
      model: hf.co/INSAIT-Institute/MamayLM-Gemma-3-27B-IT-v2.0-GGUF:Q4_K_M
      request_timeout_s: 300
    gemma-4-31b:
      backend: ollama
      model: hf.co/google/gemma-4-31B-it-qat-q4_0-gguf:q4_0-it
      request_timeout_s: 300
    qwen3.6:
      backend: ollama
      model: batiai/qwen3.6-35b:iq3
      request_timeout_s: 300
    gemma-4-e4b-vllm:
      backend: vllm
      model: google/gemma-4-E4B-it-qat-w4a16-ct
      gpu_memory_utilization: 0.80
      max_model_len: 8192
      limit_mm_per_prompt: '{"image": 0, "audio": 0}'

  16:
    mamaylm:
      backend: ollama
      model: hf.co/INSAIT-Institute/MamayLM-Gemma-3-27B-IT-v2.0-GGUF:Q4_K_M
      request_timeout_s: 300
    gemma-4-31b:
      backend: ollama
      model: hf.co/google/gemma-4-31B-it-qat-q4_0-gguf:q4_0-it
      request_timeout_s: 300
    qwen3.6:
      backend: ollama
      model: batiai/qwen3.6-35b:iq3
      request_timeout_s: 300
    gemma-4-12b-vllm:
      backend: vllm
      model: google/gemma-4-12B-it-qat-w4a16-ct
      gpu_memory_utilization: 0.85
      max_model_len: 8192
      limit_mm_per_prompt: '{"image": 0, "audio": 0}'

  24:
    mamaylm:
      backend: ollama
      model: hf.co/INSAIT-Institute/MamayLM-Gemma-3-27B-IT-v2.0-GGUF:Q4_K_M
      request_timeout_s: 300
    gemma-4-31b:
      backend: vllm
      model: google/gemma-4-31B-it-qat-w4a16-ct
      gpu_memory_utilization: 0.90
      max_model_len: 16384
      limit_mm_per_prompt: '{"image": 0, "audio": 0}'
    qwen3.6:
      backend: ollama
      model: batiai/qwen3.6-35b:iq4
      request_timeout_s: 300

  32:
    mamaylm:
      backend: vllm
      model: INSAIT-Institute/MamayLM-Gemma-3-27B-IT-v2.0-FP8-dynamic
      gpu_memory_utilization: 0.90
      max_model_len: 8192
      limit_mm_per_prompt: '{"image": 0}'
    gemma-4-31b:
      backend: vllm
      model: google/gemma-4-31B-it-qat-w4a16-ct
      gpu_memory_utilization: 0.90
      max_model_len: 16384
      limit_mm_per_prompt: '{"image": 0, "audio": 0}'
    qwen3.6:
      backend: ollama
      model: batiai/qwen3.6-35b:iq4
      request_timeout_s: 300
