# Candidate models for the Ukrainian benchmark (seeds Open Question 3).
# `make prep-models` reads this: it detects the host GPU, pulls the Ollama tags, and
# snapshot-caches the vLLM (Hugging Face) weights once. `make list-models` estimates fit.
#
#   backend:     ollama (Ollama manages its own store) | vllm (HF weights, cached once)
#   source:      Ollama tag           | Hugging Face repo id
#   min_vram_gb: rough floor to SERVE the model at a sane context on this hardware class
#                (used only to skip/flag oversized models; the real fit test is a launch)
#
# Repo ids below were taken from the linked HF collections (verified live):
#   Gemma 4            https://huggingface.co/collections/google/gemma-4
#   Gemma 4 QAT Q4_0   https://huggingface.co/collections/google/gemma-4-qat-q4-0
#   Qwen3.6            https://huggingface.co/collections/Qwen/qwen36
#   MamayLM v2.0       https://huggingface.co/collections/INSAIT-Institute/mamaylm-v20-gemma-3
#
# Notes that shape these picks for a 16 GB RTX 4060 Ti:
#  - LICENSE / GATING: none of the models below are gated (Gemma 4 ships UNGATED, unlike the
#    gated Gemma 2/3, and the rest are open), so they download without HF_TOKEN -- though
#    you still must comply with their Gemma/Apache licenses. To add a GATED model (e.g. a
#    Gemma 2/3 or Llama repo) set `gated: true` + `license_url: <hf-page>` on the entry;
#    `prep-models` then prints the acceptance link (and does so automatically when a download
#    hits a gate). See the commented example at the end of this file.
#  - QAT formats: the gemma-4-qat-q4-0 collection ships `-w4a16-ct` (int4 for vLLM, used
#    here), `-gguf` (Ollama/llama.cpp), and `-unquantized` (bf16). On 16 GB, only the int4
#    Gemma-4 fits vLLM in VRAM; the larger bf16/FP8 models below are offload/bigger-GPU
#    candidates (vLLM does not split layers to CPU the way llama.cpp does -- for those,
#    prefer the GGUF variant on Ollama; see the comment block at the end).
#  - These are multimodal (image-text); we serve + score TEXT only.
#  - Gemma 3/4 use sliding-window attention, so `list-models` over-estimates KV cache at
#    long context (its feasible-context numbers are conservative for these models).
#  - w4a16 / fp8 WEIGHTS keep the embedding (and Gemma 3n Per-Layer Embeddings) high-precision
#    while quantizing only the linear layers, so a flat `params_b x bpw` under-counts. The
#    planner is now EMBEDDING-AWARE (M4.1): it prices the high-precision mass at 16-bit from the
#    `vocab_size` / `hidden_size` / `tie_word_embeddings` (or `hi_precision_params_b`) fields
#    below. Anchor: gemma-4-E4B-it-w4a16 MEASURED 9.8 GiB weights (M2.4, RTX 4060 Ti); the
#    estimate now lands there instead of the old ~4.2 GiB. GGUF k-quants quantize the embedding
#    too, so the premium does NOT apply to Ollama/llama.cpp q4_k_m sources.
#
# Planning fields (used by `make list-models`; arch values also auto-read from each config.json):
#   params_b  billions   quant  bpw class (bf16, fp8, w4a16, q4_k_m, ...)  n_layers
#   kv_dim    n_kv_heads * head_dim    max_context  model max window
#   vocab_size / hidden_size / tie_word_embeddings  embedding-aware weights (M4.1; partial
#     quants only).  hi_precision_params_b  override (billions of params kept at 16-bit) for
#     non-vocab high-precision mass such as Gemma 3n Per-Layer Embeddings.

models:
  # --- Gemma 4 int4 (w4a16) via vLLM -- the candidates that FIT a 16 GB card. Gated. ---
  - name: gemma-4-e4b-it-w4a16
    backend: vllm
    source: google/gemma-4-E4B-it-qat-w4a16-ct
    min_vram_gb: 11    # MEASURED floor: weights load 9.8 GiB; the planner now estimates ~9.8
    params_b: 8
    quant: w4a16
    n_layers: 42
    kv_dim: 512         # 2 KV heads * 256 head_dim
    max_context: 131072
    vocab_size: 262144
    tie_word_embeddings: true
    # token embedding + Gemma 3n Per-Layer Embeddings stay bf16 under w4a16; this override is
    # anchored to the MEASURED 9.8 GiB weights (M2.4), not vocab-derived (PLE is not in vocab).
    hi_precision_params_b: 4.2
    # M2.4 validated on the RTX 4060 Ti (vLLM 0.23.0, flashinfer sampler off): weights 9.8 GiB,
    # ~64 tok/s steady, peak VRAM 15.7 GB at gpu-memory-utilization 0.80, served ctx 8192,
    # cold load ~112 s, tokenizer ~0.33 tok/UA-char. The M2 reference real-backend run.
    notes: Gemma 4 ~8B int4 (w4a16, for vLLM); the M2.4 reference run -- fits 16 GB

  - name: gemma-4-12b-it-w4a16
    backend: vllm
    source: google/gemma-4-12B-it-qat-w4a16-ct
    min_vram_gb: 10
    params_b: 12
    quant: w4a16
    n_layers: 48
    kv_dim: 2048        # 8 KV heads * 256 head_dim
    max_context: 262144
    vocab_size: 262144  # embedding-aware (M4.1): the 256k embedding stays bf16 under w4a16
    hidden_size: 3840
    tie_word_embeddings: true
    notes: Gemma 4 12B int4; the primary 16 GB vLLM fit (sliding-window, so KV is small)

  # --- Larger current-gen candidates: offload or a bigger GPU on 16 GB (flagged by list-models). ---
  - name: qwen3.6-35b-a3b-fp8
    backend: vllm
    source: Qwen/Qwen3.6-35B-A3B-FP8
    min_vram_gb: 40
    params_b: 36          # total weights held in memory; MoE activates ~3B per token
    quant: fp8
    n_layers: 40
    kv_dim: 512           # 2 KV heads * 256 head_dim
    max_context: 262144
    notes: Qwen3.6 MoE (36B total / ~3B active) FP8; Apache-2.0; 16 GB uses the IQ3 Ollama fallback
    sources:
      ollama:
        source: batiai/qwen3.6-35b:iq3
        quant: iq3
        bpw: 3.5
        min_vram_gb: 8

  - name: mistral-small-3.1-24b
    backend: vllm
    source: RedHatAI/Mistral-Small-3.1-24B-Instruct-2503-quantized.w4a16
    min_vram_gb: 20
    params_b: 24          # 23.6B dense; rounded up so the quantized weight estimate stays honest
    quant: w4a16
    n_layers: 40
    kv_dim: 1024          # 8 KV heads * 128 head_dim (full attention -- no sliding window)
    max_context: 131072
    vocab_size: 131072    # embedding-aware (M4.1): the 131k embedding + UNTIED lm_head stay bf16
    hidden_size: 5120     # under w4a16, so a flat params_b x bpw under-counts the weights
    tie_word_embeddings: false
    notes: Mistral Small 3.1 (24B, Apache-2.0, multilingual); vLLM fp8/w4a16 on 32/24 GiB, q4 GGUF below
    # Multi-quant vLLM (resolver-multi-quant-vllm): the resolver prices each vLLM quant and picks
    # the highest-quality one that fits the host on GPU -- fp8 (~24 GiB) on a 32 GiB card, w4a16
    # (~14 GiB) on a 24 GiB card -- then falls back to the curated GGUF on Ollama for 12/16 GiB.
    # Quants are ranked by bits-per-weight; arch fields are shared from this parent entry. Use
    # Ollama's CURATED `mistral-small3.1` tag (q4_k_m): the lmstudio/bartowski HF GGUF mirrors of
    # this checkpoint crash the Ollama 0.20 llama.cpp runner on load, while the curated tag is
    # tested against the runtime and serves the text path (we score text only).
    sources:
      vllm:
        - source: RedHatAI/Mistral-Small-3.1-24B-Instruct-2503-FP8-dynamic
          quant: fp8
          min_vram_gb: 30
        - source: RedHatAI/Mistral-Small-3.1-24B-Instruct-2503-quantized.w4a16
          quant: w4a16
          min_vram_gb: 20
      ollama:
        source: mistral-small3.1:24b
        quant: q4_k_m
        min_vram_gb: 8

  - name: mamaylm-v2-12b
    backend: vllm
    source: INSAIT-Institute/MamayLM-Gemma-3-12B-IT-v2.0
    min_vram_gb: 26
    params_b: 12
    quant: bf16
    n_layers: 48
    kv_dim: 2048        # 8 KV heads * 256 head_dim
    max_context: 131072
    notes: Ukrainian-specialized (Gemma-3-12B); on 16 GB the resolver picks the q4 GGUF (offload)
    # Per-source records (M3.2): the resolver prices each artifact with its OWN quant -- the bf16
    # vLLM weights do not fit 16 GB, but the q4_k_m GGUF runs on Ollama via CPU offload.
    sources:
      ollama:
        source: hf.co/INSAIT-Institute/MamayLM-Gemma-3-12B-IT-v2.0-GGUF:Q4_K_M
        quant: q4_k_m
        min_vram_gb: 8

  - name: mamaylm-v2-27b-fp8
    backend: vllm
    source: INSAIT-Institute/MamayLM-Gemma-3-27B-IT-v2.0-FP8-dynamic
    min_vram_gb: 30
    params_b: 27
    quant: fp8
    n_layers: 62
    kv_dim: 2048        # 16 KV heads * 128 head_dim
    max_context: 131072
    vocab_size: 262144  # embedding-aware (M4.1): embedding stays bf16 even in the fp8 checkpoint
    hidden_size: 5376
    tie_word_embeddings: true
    notes: Ukrainian-specialized 27B FP8; also a local-judge candidate (Premise 2); bigger GPU
    sources:
      ollama:
        source: hf.co/INSAIT-Institute/MamayLM-Gemma-3-27B-IT-v2.0-GGUF:Q4_K_M
        quant: q4_k_m
        min_vram_gb: 8

  - name: lapa-v0.1.2-instruct
    backend: vllm
    source: lapa-llm/lapa-v0.1.2-instruct
    min_vram_gb: 26
    params_b: 12
    quant: bf16
    n_layers: 48
    kv_dim: 2048        # 8 KV heads * 256 head_dim
    max_context: 131072
    notes: Ukrainian-specialized (Gemma-3-12B, lang-uk); resolver picks the q4 GGUF (offload)
    sources:
      ollama:
        source: hf.co/lapa-llm/lapa-v0.1.2-instruct-GGUF:Q4_K_M
        quant: q4_k_m
        min_vram_gb: 8

  # --- To run the large Ukrainian models ON a 16 GB card, use their GGUF via Ollama, which
  #     offloads layers to the 128 GB system RAM (vLLM does not). Verify the quant tag first.
  # - name: mamaylm-v2-12b-gguf
  #   backend: ollama
  #   source: hf.co/INSAIT-Institute/MamayLM-Gemma-3-12B-IT-v2.0-GGUF:Q4_K_M
  #   min_vram_gb: 8
  #   params_b: 12
  #   quant: q4_k_m
  #   n_layers: 48
  #   kv_dim: 2048
  #   max_context: 131072
  #   notes: UA 12B via Ollama GGUF (CPU offload); also MamayLM-Gemma-3-27B-IT-v2.0-GGUF

  # --- The same GGUF also serves on llama.cpp (M4.5): add a `llamacpp:` source so the resolver
  #     can pick `llama-server` when Ollama is unavailable (priority vllm > ollama > llamacpp).
  #     `llama-server` loads it via `-hf <repo>:<quant>` (the hf.co/ prefix is stripped).
  #   sources:
  #     llamacpp:
  #       source: hf.co/INSAIT-Institute/MamayLM-Gemma-3-12B-IT-v2.0-GGUF:Q4_K_M
  #       quant: q4_k_m
  #       min_vram_gb: 8

  # --- Example of a GATED model (none above are gated). `prep-models` prints `license_url`
  #     so you can accept the terms, then you must set HF_TOKEN in .env before it downloads:
  # - name: gemma-3-12b-it
  #   backend: vllm
  #   source: google/gemma-3-12b-it
  #   gated: true
  #   license_url: https://huggingface.co/google/gemma-3-12b-it
  #   min_vram_gb: 26
  #   params_b: 12
  #   quant: bf16
  #   n_layers: 48
  #   kv_dim: 2048
  #   max_context: 131072
  #   notes: gated (Gemma 3); accept the license at license_url + set HF_TOKEN
