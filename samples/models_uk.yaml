# Candidate models for the Ukrainian benchmark (seeds Open Question 3).
# `make prep-models` reads this: it detects the host GPU, pulls the Ollama tags, and
# snapshot-caches the vLLM (Hugging Face) weights once.
#
#   backend:     ollama (Ollama manages its own store) | vllm (HF weights, cached once)
#   source:      Ollama tag           | Hugging Face repo id
#   min_vram_gb: rough floor to SERVE the model at a sane context on this hardware class
#                (used only to skip/flag oversized models; the real fit test is a launch)
#
# This is a starting set you own and edit. The Ollama tags and the two HF ids below are
# stable; verify any id you add (a wrong repo id is reported and skipped, not fatal).
#
# Planning fields (used by `make list-models` to estimate runnable context + GPU/CPU split;
# all approximate, edit to taste):
#   params_b     parameters in billions
#   quant        bits-per-weight class (q4_k_m, q8_0, fp16, ...) -- or set `bpw:` directly
#   n_layers     transformer blocks
#   kv_dim       n_kv_heads * head_dim (the per-layer KV width; smaller under GQA)
#   max_context  the model's max context window

models:
  # --- CUDA-free path (Ollama). The 3B is the Milestone 1 smoke target. ---
  - name: llama3.2-3b
    backend: ollama
    source: llama3.2:3b
    min_vram_gb: 4
    params_b: 3.2
    quant: q4_k_m
    n_layers: 28
    kv_dim: 1024        # 8 KV heads * 128 head_dim
    max_context: 131072
    notes: small multilingual baseline; the CUDA-free smoke target

  - name: qwen2.5-7b
    backend: ollama
    source: qwen2.5:7b
    min_vram_gb: 6
    params_b: 7.6
    quant: q4_k_m
    n_layers: 28
    kv_dim: 512         # 4 KV heads * 128 head_dim (GQA)
    max_context: 32768

  - name: gemma2-9b
    backend: ollama
    source: gemma2:9b
    min_vram_gb: 8
    params_b: 9.2
    quant: q4_k_m
    n_layers: 42
    kv_dim: 2048        # 8 KV heads * 256 head_dim
    max_context: 8192

  # --- HF weights served via vLLM (cached once into the HF cache). ---
  - name: qwen2.5-7b-instruct
    backend: vllm
    source: Qwen/Qwen2.5-7B-Instruct
    min_vram_gb: 14
    params_b: 7.6
    quant: fp16
    n_layers: 28
    kv_dim: 512
    max_context: 32768
    notes: logprob-capable -> full Tier-1 public screen (MCQ + generative)

  # google/gemma-2-9b-it is gated: accept the license on HF and set HF_TOKEN in .env first.
  # In fp16 a 9B will not fit a 16 GB card in VRAM alone -- list-models shows the CPU offload.
  - name: gemma2-9b-it
    backend: vllm
    source: google/gemma-2-9b-it
    min_vram_gb: 18
    params_b: 9.2
    quant: fp16
    n_layers: 42
    kv_dim: 2048
    max_context: 8192
    notes: gated repo (needs HF_TOKEN + accepted license)

