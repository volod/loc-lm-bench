# loc-lm-bench run config -- Milestone 1 (compile-free skeleton: prebuilt Ollama, no source build).
# Pass with `llb run-eval --config samples/configs/run_config_uk.yaml`. Any field left out falls
# back to the defaults in llb.config.RunConfig; CLI flags override individual fields.

run_name: m1-uk-skeleton
seed: 13

# Model + backend (M1 ships the Ollama backend; the tag must be pulled locally).
model: llama3.2:3b
backend: ollama
max_tokens: 512
temperature: 0.0        # deterministic decoding for reproducible scoring
n_shot: 0               # fixed across compared models (avoids the 0-shot/3-shot mixing bug)

# Retrieval. The embedding is PINNED and validated separately (Premise 4); it is never an
# Optuna knob. chunk_size / overlap / top_k are tunable in later milestones.
embedding_model: intfloat/multilingual-e5-base
strategy: recursive     # fixed | sentence | recursive | markdown | semantic
chunk_size: 800
chunk_overlap: 120
top_k: 5

# Retrieval mode: flat indexes chunk_size chunks; parent_child indexes small children for
# precise matching but returns their larger parent for generation context.
retrieval_mode: flat    # flat | parent_child
child_chunk_size: 400   # used only in parent_child mode

# Judge gating (Premise 2): the judge stays demoted to a diagnostic until a calibration
# rho >= judge_threshold is supplied (via `run-eval --judge-rho`).
judge_model: null
judge_base_url: null
judge_threshold: 0.6

# Stable committed public development fixture. Replace both paths for private evaluation.
# data_dir: .data
corpus_root: samples/goldsets/ua_squad_postedited_v1/corpus
goldset_path: samples/goldsets/ua_squad_postedited_v1/goldset.jsonl
