# loc-lm-bench run config -- Milestone 1 (CUDA-free skeleton).
# Pass with `llb run-eval --config samples/run_config_uk.yaml`. Any field left out falls
# back to the defaults in llb.config.RunConfig; CLI flags override individual fields.

run_name: m1-uk-skeleton
seed: 13

# Model + backend (M1 ships the Ollama backend; the tag must be pulled locally).
model: llama3.2:3b
backend: ollama
max_tokens: 512
temperature: 0.0        # deterministic decoding for reproducible scoring
n_shot: 0               # fixed across compared models (avoids the 0-shot/3-shot mixing bug)

# Retrieval. The embedding is PINNED and validated separately (Premise 4); it is never an
# Optuna knob. chunk_size / overlap / top_k are tunable in later milestones.
embedding_model: intfloat/multilingual-e5-base
strategy: recursive     # fixed | sentence | recursive
chunk_size: 800
chunk_overlap: 120
top_k: 5

# Judge gating (Premise 2): the judge stays demoted to a diagnostic until a calibration
# rho >= judge_threshold is supplied (via `run-eval --judge-rho`).
judge_model: null
judge_threshold: 0.6

# Paths default to .data/llb/...; uncomment to point elsewhere.
# data_dir: .data
# corpus_root: .data/llb/corpus
# goldset_path: .data/llb/goldset/goldset_uk.jsonl
